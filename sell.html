<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลงขายสินค้า | fakkai</title>

<style>
body {
  margin: 0;
  font-family: 'Prompt', sans-serif;
  background: #f4f7fb;
}

.container {
  max-width: 500px;
  margin: 40px auto;
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  background: #145bdc;
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #0f4ac4;
}
</style>
</head>

<body>

<div class="container">
  <h2>ลงขายสินค้า</h2>

  <input id="title" placeholder="ชื่อสินค้า">
  <input id="price" placeholder="ราคา">
  <input id="category" placeholder="หมวดหมู่">
  <input id="province" placeholder="จังหวัด">
  <textarea id="description" placeholder="รายละเอียด"></textarea>
  <input id="image_url" placeholder="ลิงก์รูปสินค้า">
  <input id="phone" placeholder="เบอร์โทร">
  <input id="line_id" placeholder="LINE ID">

  <button id="sellBtn">ลงขาย</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://ehuegkxeywnsthgdprch.supabase.co',
  'sb_publishable_YE1L_O6G2rzKFcOUlTfLGQ_eHfzAISh'
)

document.getElementById('sellBtn').addEventListener('click', async () => {
  const { data: { user } } = await supabase.auth.getUser()

  if (!user) {
    alert("กรุณา login ก่อน")
    window.location.href = "/login.html"
    return
  }

  const { error } = await supabase.from('products').insert([
    {
      user_id: user.id,
      title: document.getElementById('title').value,
      price: document.getElementById('price').value,
      category: document.getElementById('category').value,
      province: document.getElementById('province').value,
      description: document.getElementById('description').value,
      image_url: document.getElementById('image_url').value,
      phone: document.getElementById('phone').value,
      line_id: document.getElementById('line_id').value,
      status: 'active'
    }
  ])

  if (error) {
    alert(error.message)
  } else {
    alert("ลงขายสำเร็จ!")
    window.location.href = "/"
  }
})
</script>

</body>
</html>
