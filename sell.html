<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ลงขายสินค้า</title>
</head>
<body>

<h2>ลงขายสินค้า</h2>

<input id="title" placeholder="ชื่อสินค้า"><br><br>
<input id="price" placeholder="ราคา"><br><br>
<input id="category" placeholder="หมวด"><br><br>
<input id="province" placeholder="จังหวัด"><br><br>
<textarea id="description" placeholder="รายละเอียด"></textarea><br><br>
<input id="image_url" placeholder="ลิงก์รูปสินค้า"><br><br>
<input id="phone" placeholder="เบอร์โทร"><br><br>
<input id="line_id" placeholder="LINE ID"><br><br>

<button id="sellBtn">ลงขาย</button>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://ehuegkxeywnsthgdprch.supabase.co',
  'sb_publishable_YE1L_O6G2rzKFcOUlTfLGQ_eHfzAISh'
)

document.getElementById('sellBtn').addEventListener('click', async () => {
  const { data: { user } } = await supabase.auth.getUser()

  if (!user) {
    alert('กรุณา login ก่อน')
    window.location.href = '/login.html'
    return
  }

  const { error } = await supabase.from('products').insert([
    {
      user_id: user.id,
      title: document.getElementById('title').value,
      price: document.getElementById('price').value,
      category: document.getElementById('category').value,
      province: document.getElementById('province').value,
      description: document.getElementById('description').value,
      image_url: document.getElementById('image_url').value,
      phone: document.getElementById('phone').value,
      line_id: document.getElementById('line_id').value,
      status: 'active'
    }
  ])

  if (error) {
    alert('Error: ' + error.message)
  } else {
    alert('ลงขายสำเร็จ!')
    window.location.href = '/'
  }
})
</script>

</body>
</html>
