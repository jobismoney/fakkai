<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fakkai Marketplace</title>
<style>
body { font-family: sans-serif; padding:20px; }
.grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap:15px; }
.card { border:1px solid #ddd; padding:15px; border-radius:10px; }
</style>
</head>
<body>

<h2>สินค้าในระบบ</h2>

<div class="grid" id="products"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://ehuegkxeywnsthgdprch.supabase.co',
  'sb_publishable_YE1L_O6G2rzKFcOUlTfLGQ_eHfzAISh'
)

const { data, error } = await supabase
  .from('products')
  .select('*')
  .order('created_at', { ascending: false })

const container = document.getElementById('products')

if (error) {
  container.innerHTML = "โหลดข้อมูลไม่ได้"
} else {
  data.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <h3>${item.title}</h3>
        <p>💰 ${item.price} บาท</p>
        <p>📍 ${item.province}</p>
        <p>${item.description}</p>
      </div>
    `
  })
}
</script>

</body>
</html>
